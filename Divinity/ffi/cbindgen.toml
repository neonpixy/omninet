language = "C"
header = """// Divinity FFI — C bindings for the Omnidea Rust core.
// AUTO-GENERATED by cbindgen. Do not edit manually.
"""
include_guard = "DIVINITY_FFI_H"
tab_width = 4
style = "both"
after_includes = """
// Opaque types — Equipment structs live in a separate crate that cbindgen
// doesn't parse (parse_deps = false), so we forward-declare them here.
// Crown types (CrownKeyring, CrownSoul) are auto-generated by cbindgen
// since they're defined in this crate.
typedef struct Phone Phone;
typedef struct Email Email;
typedef struct Contacts Contacts;
typedef struct Pager Pager;
typedef struct Omnibus Omnibus;
typedef struct LingoBabel LingoBabel;
typedef struct ExporterRegistry ExporterRegistry;
typedef struct ImporterRegistry ImporterRegistry;
typedef struct BridgeRegistry BridgeRegistry;
typedef struct FederationRegistry FederationRegistry;
"""

[export]
# No prefix — our type names already include "Divi" where appropriate.

[parse]
parse_deps = false

[enum]
rename_variants = "ScreamingSnakeCase"
